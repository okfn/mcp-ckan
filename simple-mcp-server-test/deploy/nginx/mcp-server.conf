server {
    listen 80;
    server_name mcp.whoare.io;

    # Logs
    access_log /var/log/nginx/mcp-server-access.log;
    error_log /var/log/nginx/mcp-server-error.log;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS - Main server
server {
    listen 443 ssl http2;
    server_name mcp.whoare.io;

    # SSL certificates (adjust path if needed)
    ssl_certificate /etc/letsencrypt/live/mcp.whoare.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.whoare.io/privkey.pem;

    # SSL configuration (modern, secure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/mcp-server-access.log;
    error_log /var/log/nginx/mcp-server-error.log;

    location / {
        # Proxy to MCP server
        proxy_pass http://127.0.0.1:8063;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Important for SSE/streaming                                                                                                                                                                           
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
