engine: row_list

dataset:
  name: projects-list
  description: "List of projects"
  source:
    csv: tests/fixtures/data/projects.csv
    url: https://example.org/projects

tool:
  name: list_projects
  description: "Get a list of projects with optional filters"
  columns:
    - column: COUNTRY
      label: "Country"
    - column: YEAR
      label: "Year"
    - column: SECTOR
      label: "Sector"
    - column: AMOUNT
      label: "Amount"
      format: "${result:,.2f}"
  filters:
    - column: COUNTRY
      param: country
      description: "Country name, e.g. Argentina, Brazil, Chile"
      label: "for {value}"
    - column: YEAR
      param: year
      type: int_range
      description: "Year"
      label:
        both: "between {year_from} and {year_to}"
        from_only: "from {year_from}"
        to_only: "until {year_to}"
        same: "in {year_from}"
  limit: 20
  sort:
    column: YEAR
    order: asc
  response: |
    Found {count} projects {filter_label}:
    {list}
    Source: {source}
